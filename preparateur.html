<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0D1B4B">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22AJCV%20Pr%C3%A9pa%22%2C%22short_name%22%3A%22Pr%C3%A9pa%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230D1B4B%22%2C%22theme_color%22%3A%22%230D1B4B%22%7D">
<title>AJCV Préparation</title>
<style>
:root{
  --navy:#0D1B4B; --navy2:#1A2B5F; --gold:#FFB300; --gold2:#FFC933;
  --dark:#080F28; --surface:#111827; --surface2:#1F2937;
  --green:#22C55E; --red:#EF4444; --blue:#3B82F6; --orange:#F97316;
  --text:#F9FAFB; --text2:#9CA3AF; --text3:#6B7280;
  --border:rgba(255,255,255,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}

/* ── LOGIN ── */
#login{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:100}
.login-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 22px}
.login-logo{text-align:center;margin-bottom:22px}
.login-logo .t{font-size:22px;font-weight:800;letter-spacing:.5px}
.login-logo .s{font-size:13px;color:var(--gold);margin-top:4px;letter-spacing:2px;font-weight:600}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600}
.fld input{width:100%;padding:13px 14px;border-radius:11px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px}
.pwrap{position:relative}
.pwrap button{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;cursor:pointer}
.btn-login{width:100%;padding:14px;border:none;border-radius:11px;background:var(--gold);color:var(--navy);font-size:16px;font-weight:800;cursor:pointer;margin-top:6px}
.btn-login:disabled{opacity:.5}
.login-err{display:none;margin-top:12px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#fca5a5;border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.5}
.remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-top:12px;cursor:pointer}
.remember input{width:17px;height:17px;accent-color:var(--gold)}

/* ── APP ── */
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--navy);border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:30}
.topbar .ttl{font-weight:800;font-size:16px;flex:1;display:flex;align-items:center;gap:8px}
.topbar .ttl small{font-weight:500;color:var(--text2);font-size:12px}
.iconbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:9px;width:38px;height:38px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.verbadge{font-size:11px;color:var(--text3);cursor:pointer;border:1px solid var(--border);border-radius:999px;padding:3px 8px}
.bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.bar input[type=date]{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 11px;font-size:14px}
.count{font-weight:700;font-size:14px;color:var(--text);flex:1;text-align:right}
.count b{color:var(--green)}
.search{padding:10px 14px;background:var(--surface)}
.search input{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px}
.list{padding:12px 14px 80px;display:flex;flex-direction:column;gap:11px}
.empty{text-align:center;color:var(--text2);padding:48px 16px;font-size:14px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 14px;display:flex;flex-direction:column;gap:9px}
.card.done{border-color:var(--green);background:rgba(34,197,94,.07)}
.card.refaire{border-color:var(--orange);background:rgba(249,115,22,.07)}
.c-top{display:flex;align-items:flex-start;gap:8px}
.c-client{font-weight:700;font-size:15px}
.c-sub{font-size:12.5px;color:var(--text2);margin-top:1px}
.c-qte{font-size:13px;color:var(--text);background:var(--surface2);border-radius:8px;padding:7px 10px;line-height:1.5}
.c-badge{margin-left:auto;font-size:12px;font-weight:700;white-space:nowrap;padding:3px 9px;border-radius:999px}
.b-done{color:var(--green);background:rgba(34,197,94,.14)}
.b-refaire{color:var(--orange);background:rgba(249,115,22,.16)}
.c-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn-photo{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer}
.btn-val{background:var(--green);border:none;color:#fff;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer}
.btn-val:disabled{opacity:.45}
.thumb{max-width:84px;border-radius:9px;border:1px solid var(--border);cursor:pointer}
.thumb-done{max-width:160px;border-radius:11px;border:1px solid var(--border);cursor:pointer}
.thumbs-wrap{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:6px 0}
.thumb-item{position:relative;display:inline-block;line-height:0}
.thumb-item img{width:70px;height:70px;object-fit:cover;border-radius:9px;border:1px solid var(--border);cursor:pointer;display:block}
.thumb-x{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px var(--surface2)}
.thumb-count{font-size:12px;color:var(--text2);font-weight:600}
.thumb-g{width:84px;height:84px;object-fit:cover;border-radius:10px;border:1px solid var(--border);cursor:pointer}

/* ── TOAST ── */
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120px);background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:13px 18px;font-size:14px;font-weight:600;z-index:9000;transition:transform .3s;max-width:90%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.4);white-space:pre-line}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--green)}
#toast.error{border-color:var(--red)}

/* ── MODAL NOUVEAUTÉS / LIGHTBOX ── */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:9400;padding:18px}
.ovl .box{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:460px;width:100%;max-height:80vh;overflow:auto;padding:20px}
.ovl .box h3{font-size:17px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ovl .close{margin-top:16px;width:100%;padding:12px;border:none;border-radius:10px;background:var(--surface2);color:var(--text);font-weight:700;cursor:pointer}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:9600;padding:16px}
#lightbox img{max-width:100%;max-height:90vh;border-radius:10px}
.qte-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.qte-grid label{display:flex;flex-direction:column;gap:4px;font-size:11.5px;color:var(--text2);font-weight:600}
.qte-grid input{width:100%;padding:9px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;text-align:center}
.btn-bo{width:100%;text-align:left;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 13px;font-size:13px;cursor:pointer}
.btn-bo span{color:var(--gold);font-weight:600}
.bo-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.bo-row span{font-size:14px}
.bo-row input{width:74px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;text-align:center}
.tabs{display:flex;gap:6px;padding:10px 14px 0;background:var(--surface)}
.ptab{flex:1;padding:10px 6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);border-radius:10px 10px 0 0;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.ptab.active{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.ptab-n{background:rgba(0,0,0,.16);border-radius:999px;padding:1px 7px;font-size:12px;min-width:20px;text-align:center}
.ptab.active .ptab-n{background:rgba(0,0,0,.22)}
.btn-prendre{width:100%;background:var(--gold);color:var(--navy);border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;margin-top:2px}
.btn-relacher{background:none;border:none;color:var(--text2);font-size:12.5px;cursor:pointer;padding:8px 6px 2px;text-decoration:underline;align-self:flex-start}
/* MODE CLAIR (accessibilite haute lisibilite) */
html[data-theme="light"]{
  --dark:#EDF1F7; --surface:#FFFFFF; --surface2:#EBEFF5; --surface3:#DCE2EC;
  --navy:#E3E8F2; --navy2:#D5DCEA;
  --text:#0F172A; --text2:#475569; --text3:#64748B;
  --border:rgba(15,23,42,0.14);
}
#theme-btn{position:fixed;bottom:20px;left:20px;z-index:10001;width:46px;height:46px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:21px;box-shadow:0 4px 16px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;cursor:pointer}
#theme-btn:active{transform:scale(.94)}
#test-banner{position:fixed;top:0;left:0;right:0;z-index:10002;background:#A855F7;color:#fff;font:600 13px/1.4 Arial,sans-serif;text-align:center;padding:6px 10px;box-shadow:0 2px 8px rgba(0,0,0,.35)}

/* ── Étiquettes colis (Zebra 100×150, paramétrable via ETIQ_CFG) ── */
#etiqOverlay{display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.75);overflow:auto;padding:14px}
#etiqOverlay.on{display:block}
.etiq-bar{position:sticky;top:0;display:flex;gap:10px;margin-bottom:12px;z-index:2}
.etiq-bar button{flex:1;padding:13px;border-radius:12px;border:none;font-weight:800;font-size:15px;cursor:pointer}
.etiq-print{background:#059669;color:#fff}
.etiq-close{background:#e5e7eb;color:#111}
.etiq{background:#fff;color:#000;width:101.6mm;min-height:101.6mm;margin:0 auto 14px;padding:4mm;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;display:flex;flex-direction:column;border-radius:4px}
.etiq-head{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;border-bottom:2px solid #000;padding-bottom:1.8mm;margin-bottom:2mm}
.etiq-client{font-size:18px;font-weight:900;line-height:1.1;margin-bottom:1.5mm}
.etiq-adr{font-size:12px;line-height:1.3;margin-bottom:2.5mm}
.etiq-colis{font-size:24px;font-weight:900;text-align:center;border:3px solid #000;border-radius:6px;padding:2mm;margin-bottom:2.5mm;letter-spacing:1px}
.etiq-prods{font-size:11.5px;line-height:1.45;flex:1}
.etiq-foot{font-size:9.5px;text-align:right;border-top:1px solid #000;padding-top:1.5mm;margin-top:2mm}
@media print{
  body.printing-etiq > *:not(#etiqOverlay){display:none!important}
  body.printing-etiq #etiqOverlay{display:block!important;position:static;background:none;padding:0;overflow:visible}
  body.printing-etiq .etiq-bar{display:none!important}
  body.printing-etiq{margin:0!important;padding:0!important}
  body.printing-etiq #etiqOverlay{margin:0!important}
  body.printing-etiq .etiq{margin:0!important;border-radius:0;page-break-after:always;width:101.6mm;max-width:100%;min-height:94mm}
  @page{size:101.6mm 101.6mm;margin:0}
}
</style>
<script>try{var _t=localStorage.getItem('ajcv_theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');document.documentElement.setAttribute('data-theme',_t);}catch(e){}</script>
</head>
<body>
<button id="theme-btn" title="Mode clair / sombre (accessibilite)" aria-label="Basculer le mode clair ou sombre">☀️</button>


<!-- ══ LOGIN ══ -->
<div id="login">
  <div class="login-card">
    <div class="login-logo"><div class="t">AJCV</div><div class="s">PRÉPARATION</div></div>
    <div class="fld"><label>Identifiant</label><input id="loginInput" autocomplete="username" placeholder="PREP_PRENOM" style="text-transform:uppercase"></div>
    <div class="fld"><label>Mot de passe</label>
      <div class="pwrap"><input id="mdpInput" type="password" autocomplete="current-password" placeholder="••••••••">
      <button type="button" onclick="toggleMdp()"><span id="eyeIcon">👁</span></button></div>
    </div>
    <button id="btnLogin" class="btn-login" onclick="connexion()">Se connecter</button>
    <label class="remember"><input type="checkbox" id="rememberMdp"> Rester connecté sur cet appareil</label>
    <div class="login-err" id="loginError"></div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="ttl">🧰 Préparation<small id="userTag"></small></div>
    <span class="verbadge" id="verBadge" onclick="ouvrirNouveautes()">v…</span>
    <button class="iconbtn" onclick="chargerPrep(true)" title="Rafraîchir">🔄</button>
    <button class="iconbtn" onclick="logout()" title="Déconnexion">⏻</button>
  </div>
  <div class="bar">
    <label style="font-size:12px;color:var(--text2);font-weight:600">📅</label>
    <input type="date" id="datePicker" onchange="chargerPrep(true)">
    <span class="count" id="prepCount"></span>
  </div>
  <div class="search"><input id="searchInput" placeholder="🔍 Rechercher un client, un BL, une ville…" oninput="filtrer(this.value)"></div>
  <div class="tabs" id="prepTabs">
    <button class="ptab active" data-tab="apreparer" onclick="switchVolet('apreparer')">À préparer <span class="ptab-n" id="n-apreparer">0</span></button>
    <button class="ptab" data-tab="encours" onclick="switchVolet('encours')">En cours <span class="ptab-n" id="n-encours">0</span></button>
    <button class="ptab" data-tab="prepare" onclick="switchVolet('prepare')">Préparé <span class="ptab-n" id="n-prepare">0</span></button>
  </div>
  <div class="list" id="prepList"><div class="empty">Chargement…</div></div>
</div>

<!-- ══ NOUVEAUTÉS ══ -->
<div class="ovl" id="nouveautesModal">
  <div class="box">
    <h3>✨ Nouveautés</h3>
    <div id="nouveautesCorps"></div>
    <button class="close" onclick="fermerNouveautes()">Fermer</button>
  </div>
</div>
<div class="ovl" id="boModal">
  <div class="box">
    <h3 id="boTitre">🥤 Boissons</h3>
    <div id="boBox"></div>
    <button class="close" onclick="validerProdPrep()">OK</button>
  </div>
</div>
<div id="lightbox" onclick="this.style.display='none'"><img id="lightboxImg" src="" alt=""></div>
<div id="toast"></div>

<script>
const CFG = { API_URL: 'https://ajcvbackend-production.up.railway.app' };
const VERSION_URL = 'version.json';
const state = { token:'', prenom:'', login:'', role:'', tokenExpiry:0, orders:[], photos:{}, search:'', _date:'', volet:'apreparer', boissonsRef:[], _boId:null };
// ── Persistance des photos (survit au rechargement Android pendant la prise) ──
const _PHK='ajcvprep_photos_v1';
function persisterPhotos(){
  try{
    localStorage.setItem(_PHK, JSON.stringify({ d: new Date().toISOString().split('T')[0], p: state.photos||{} }));
  }catch(_){ /* quota plein : on continue en mémoire */ }
}
function restaurerPhotos(){
  try{
    const raw=localStorage.getItem(_PHK); if(!raw) return;
    const o=JSON.parse(raw);
    if(!o || o.d!==new Date().toISOString().split('T')[0]){ localStorage.removeItem(_PHK); return; }
    if(o.p && typeof o.p==='object') state.photos=o.p;
  }catch(_){}
}
restaurerPhotos();


/* ─────────── TOAST ─────────── */
let _toastT=null;
function showToast(msg, type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=(type||'')+' show';
  clearTimeout(_toastT); _toastT=setTimeout(()=>{ t.className=t.className.replace('show','').trim(); }, 2600);
}

/* ─────────── LOGIN ─────────── */
function toggleMdp(){
  const i=document.getElementById('mdpInput'), e=document.getElementById('eyeIcon');
  if(i.type==='password'){ i.type='text'; e.textContent='🙈'; } else { i.type='password'; e.textContent='👁'; }
}
async function connexion(){
  const login=document.getElementById('loginInput').value.trim();
  const mdp=document.getElementById('mdpInput').value.trim();
  const btn=document.getElementById('btnLogin'), err=document.getElementById('loginError');
  if(!login||!mdp){ err.textContent='Identifiant et mot de passe requis'; err.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Connexion…'; err.style.display='none';
  try{
    const resp=await fetch(`${CFG.API_URL}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,mdp,app:'preparateur'})});
    const data=await resp.json();
    if(data.error){ err.textContent='❌ '+data.error; err.style.display='block'; btn.disabled=false; btn.textContent='Se connecter'; return; }
    const peutPreparer = data.peut_preparer===true || data.role==='Admin' || data.role==='Préparateur';
    if(!peutPreparer){
      err.textContent="⛔ Ce compte n'a pas la casquette Préparateur. Demande à l'administrateur de l'activer dans l'admin (colonne Casquettes).";
      err.style.display='block'; btn.disabled=false; btn.textContent='Se connecter'; return;
    }
    state.token=data.token; state.prenom=data.prenom; state.role=data.role; state.login=login;
    state.tokenExpiry=Date.now()+((data.expiresIn||480)*60*1000);
    try{
      const rem=document.getElementById('rememberMdp');
      if(rem&&rem.checked) localStorage.setItem('ajcvprep_cred', JSON.stringify({login,mdp}));
      else localStorage.removeItem('ajcvprep_cred');
    }catch(_){}
    try{ localStorage.setItem('ajcvprep_session', JSON.stringify({token:state.token,tokenExpiry:state.tokenExpiry,prenom:state.prenom,role:state.role,login})); }catch(_){}
    lancerApp();
  }catch(e){ err.textContent='❌ Erreur de connexion. Vérifie ton réseau.'; err.style.display='block'; btn.disabled=false; btn.textContent='Se connecter'; }
}
function restoreSession(){
  try{
    const s=JSON.parse(localStorage.getItem('ajcvprep_session')||'null');
    if(s&&s.token&&s.tokenExpiry>Date.now()){
      Object.assign(state,{token:s.token,prenom:s.prenom,role:s.role,login:s.login,tokenExpiry:s.tokenExpiry});
      lancerApp(); return true;
    }
  }catch(_){}
  try{
    const c=JSON.parse(localStorage.getItem('ajcvprep_cred')||'null');
    if(c){ document.getElementById('loginInput').value=c.login; document.getElementById('mdpInput').value=c.mdp; }
  }catch(_){}
  return false;
}
function logout(){
  localStorage.removeItem('ajcvprep_session');
  location.reload();
}
function sessionExpiree(){
  showToast('Session expirée, reconnecte-toi','error');
  localStorage.removeItem('ajcvprep_session');
  setTimeout(()=>location.reload(), 1400);
}

/* ─────────── APP ─────────── */
function lancerApp(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userTag').textContent=' · '+(state.prenom||state.login);
  const dp=document.getElementById('datePicker');
  if(!dp.value) dp.value=new Date().toISOString().split('T')[0];
  chargerBoissonsRef();
  chargerPrep(true);
}
async function chargerBoissonsRef(){
  try{
    const resp=await fetch(`${CFG.API_URL}/boissons?categorie=ALL`,{headers:{'Authorization':`Bearer ${state.token}`}});
    if(!resp.ok) return;
    const data=await resp.json();
    const list=(data.boissons||data||[]).filter(b=>b.actif!==false);
    state.boissonsRef=list.filter(b=>((b.categorie||'BOISSON').toUpperCase())==='BOISSON');
    state.prodRefs={BOISSON:[],CHARBON:[],PLV:[],TPE:[]};
    list.forEach(b=>{ const c=(b.categorie||'BOISSON').toUpperCase(); if(!state.prodRefs[c]) state.prodRefs[c]=[]; state.prodRefs[c].push(b); });
    if((state.orders||[]).length) renderPrep();
  }catch(_){}
}
function getDateSelectionnee(){
  const p=document.getElementById('datePicker');
  if(!p||!p.value) return '';
  const d=new Date(p.value);
  return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
}

function estPrepare(l){ return !!l.prepare && !l.photo_a_refaire; }

async function chargerPrep(force){
  const el=document.getElementById('prepList');
  const dSel=getDateSelectionnee();
  if(force){ state.orders=null; }
  if(!state.orders || state._date!==dSel){
    el.innerHTML='<div class="empty">Chargement des commandes…</div>';
    try{
      const resp=await fetch(`${CFG.API_URL}/livraisons?date=${encodeURIComponent(dSel)}`,{headers:{'Authorization':`Bearer ${state.token}`}});
      if(resp.status===401){ sessionExpiree(); return; }
      const data=await resp.json();
      state.orders=data.livraisons||[];
      state._date=dSel;
    }catch(e){ el.innerHTML='<div class="empty">Erreur de chargement.<br><button class="btn-photo" style="margin-top:12px" onclick="chargerPrep(true)">Réessayer</button></div>'; return; }
  }
  renderPrep();
}
function renderPrep(){
  const el=document.getElementById('prepList');
  const livs=state.orders||[];
  const aprep=livs.filter(estAPreparer), encours=livs.filter(estEnCours), prep=livs.filter(estPrepare);
  const setN=(id,n)=>{ const e=document.getElementById(id); if(e) e.textContent=n; };
  setN('n-apreparer',aprep.length); setN('n-encours',encours.length); setN('n-prepare',prep.length);
  document.getElementById('prepCount').innerHTML=`<b>${prep.length}</b> / ${livs.length} préparées`;
  if(livs.length===0){ el.innerHTML='<div class="empty">Aucune commande pour cette date.</div>'; return; }
  const volet=state.volet||'apreparer';
  const list= volet==='encours'?encours : (volet==='prepare'?prep : aprep);
  if(list.length===0){
    const vide= volet==='apreparer'?'Tout est pris en charge 👍' : (volet==='encours'?'Aucune préparation en cours.':'Aucune commande préparée.');
    el.innerHTML=`<div class="empty">${vide}</div>`; return;

/* ─────────── PHOTO ─────────── */
function compresserPhoto(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>h&&w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>=w&&h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        resolve(cv.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject; img.src=fr.result;
    };
    fr.onerror=reject; fr.readAsDataURL(file);
  });
}
async function photoChoisie(id,input){
  const files=input.files; if(!files||!files.length) return;
  if(!Array.isArray(state.photos[id])) state.photos[id]=[];
  for(const f of files){
    try{ const b64=await compresserPhoto(f,1200,0.7); state.photos[id].push(b64); persisterPhotos(); }
    catch(e){ showToast('❌ Une photo illisible','error'); }
  }
  input.value='';
  renderThumbs(id);
}
function renderThumbs(id){
  const wrap=document.getElementById('thumbs-'+id); if(!wrap) return;
  const arr=Array.isArray(state.photos[id])?state.photos[id]:[];
  wrap.innerHTML=arr.map((b,i)=>`<div class="thumb-item"><img src="${b}" onclick="agrandir('${b.replace(/'/g,'%27')}')" alt=""><button class="thumb-x" onclick="supprimerPhoto('${id}',${i})">✕</button></div>`).join('')
    +(arr.length?`<span class="thumb-count">${arr.length} photo${arr.length>1?'s':''}</span>`:'');
}
function supprimerPhoto(id,i){
  if(Array.isArray(state.photos[id])){ state.photos[id].splice(i,1); persisterPhotos(); renderThumbs(id); }
}
function photosDe(l){
  let p=l.photos_preparation;
  if(typeof p==='string'){ try{ p=JSON.parse(p); }catch(_){ p=null; } }
  if(Array.isArray(p)&&p.length) return p;
  return l.photo_preparation?[l.photo_preparation]:[];
}
async function validerPrep(id){
  const photos=Array.isArray(state.photos[id])?state.photos[id]:[];
  if(!photos.length){ showToast('📷 Ajoute au moins une photo','error'); return; }
  const l=(state.orders||[]).find(x=>String(x.id)===String(id));
  const bd=l?detailDe(l,'boissons_detail'):{};
  const body={ id, photos,
    nb_colis: lireQte(id,'nb_colis', l?colisDe(l):0),
    nb_cadeaux: lireQte(id,'nb_cadeaux', l?cadeauxDe(l):0),
    boissons_detail: bd,
    nb_boissons: Object.values(bd).reduce((a,c)=>a+(parseInt(c)||0),0),
    charbons_detail: l?detailDe(l,'charbons_detail'):{},
    plv_detail: l?detailDe(l,'plv_detail'):{},
    tpe_detail: l?detailDe(l,'tpe_detail'):{} };
  const btn=document.getElementById('val-'+id);
  if(btn){ btn.disabled=true; btn.textContent='⏳…'; }
  const ab=new AbortController(); const tmo=setTimeout(()=>ab.abort(),60000);
  try{
    const resp=await fetch(`${CFG.API_URL}/livraisons/preparation`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${state.token}`},body:JSON.stringify(body),signal:ab.signal});
    clearTimeout(tmo);
    if(resp.status===401){ sessionExpiree(); return; }
    const r=await resp.json().catch(()=>({}));
    if(resp.ok&&r.success){
      if(l){ l.prepare=true; l.en_preparation=false; l.photo_preparation=r.url||''; l.photos_preparation=r.urls||[]; l.photo_a_refaire=false;
        l.nb_colis=body.nb_colis; l.nb_cadeaux=body.nb_cadeaux; l.boissons_detail=bd; l.nb_boissons=body.nb_boissons;
        l.charbons_detail=body.charbons_detail; l.nb_charbons=Object.values(body.charbons_detail||{}).reduce((a,c)=>a+(parseInt(c)||0),0);
        l.plv_detail=body.plv_detail; l.nb_plv=Object.values(body.plv_detail||{}).reduce((a,c)=>a+(parseInt(c)||0),0);
        l.tpe_detail=body.tpe_detail; l.nb_tpe=Object.values(body.tpe_detail||{}).reduce((a,c)=>a+(parseInt(c)||0),0); }
      delete state.photos[id]; persisterPhotos();
      showToast('✅ Préparation validée','success');
      renderPrep();
      envoyerEtiquettes(id);
    } else {
      showToast('❌ '+((r&&r.error)||"Échec de l'envoi"),'error');
      if(btn){ btn.disabled=false; btn.textContent='Valider ✓'; }
    }
  }catch(e){
    clearTimeout(tmo);
    showToast(e&&e.name==='AbortError'?'❌ Réseau trop lent — réessaie, tes photos sont conservées':'❌ Erreur réseau','error');
    if(btn){ btn.disabled=false; btn.textContent='Valider ✓'; }
  }
}

const ETIQ_CFG = { entreprise: 'AJCV' };   // dimensions : voir @page dans le CSS (100×150 mm)
function etiqProduits(l){
  const out=[];
  const push=(ic,det,nb,label)=>{
    const d=(l[det]&&typeof l[det]==='object')?l[det]:{};
    const ks=Object.entries(d).filter(([,q])=>parseInt(q)>0);
    if(ks.length) ks.forEach(([t,q])=>out.push(ic+' '+t+' × '+q));
    else { const n=parseInt(l[nb])||0; if(n) out.push(ic+' '+label+' × '+n); }
  };
  push('🥤','boissons_detail','nb_boissons','Boissons');
  push('🔥','charbons_detail','nb_charbons','Charbons');
  push('🪧','plv_detail','nb_plv','PLV');
  push('💳','tpe_detail','nb_tpe','TPE');
  const cad=parseInt(l.nb_cadeaux)||0; if(cad) out.push('🎁 Cadeaux × '+cad);
  return out;
}

  if(!Array.isArray(state.modPhotos[id])) state.modPhotos[id]=[];
  const files=Array.from(inp.files||[]); inp.value='';
  for(const f of files){ try{ const b64=await compresserPhoto(f,1200,0.7); state.modPhotos[id].push(b64); }catch(_){ showToast('❌ Photo illisible','error'); } }
  renderModifThumbs(id);
}
function renderModifThumbs(id){
  const w=document.getElementById('mod-th-'+id); if(!w) return;
  const arr=(state.modPhotos&&state.modPhotos[id])||[];
  w.innerHTML=arr.map((b,i)=>`<div class="thumb-item"><img src="${b}" alt=""><button class="thumb-x" onclick="retirerModifPhoto('${id}',${i})">✕</button></div>`).join('')+(arr.length?`<span class="thumb-count">${arr.length} à ajouter</span>`:'');
}
function retirerModifPhoto(id,i){ if(state.modPhotos&&Array.isArray(state.modPhotos[id])){ state.modPhotos[id].splice(i,1); renderModifThumbs(id); } }
async function enregistrerModif(id){
  const l=(state.orders||[]).find(x=>String(x.id)===String(id)); if(!l) return;
  const inp=document.getElementById('mod-colis-'+id);
  const nc=inp?Math.max(1,parseInt(inp.value)||1):null;
  const nouvelles=(state.modPhotos&&state.modPhotos[id])||[];
  const colisChange=(nc!=null && nc!==(parseInt(l.nb_colis)||1));
  if(!colisChange && !nouvelles.length){ showToast('Rien à modifier',''); return; }
  const body={ id }; if(colisChange) body.nb_colis=nc; if(nouvelles.length) body.photos=nouvelles;
  try{
    const resp=await fetch(`${CFG.API_URL}/livraisons/preparation-modif`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${state.token}`},body:JSON.stringify(body)});
    if(resp.status===401){ sessionExpiree(); return; }
    const r=await resp.json().catch(()=>null);
    if(r&&r.success){
      if(colisChange){ l.nb_colis=nc; l.nbColis=nc; }
      if(r.photos_preparation) l.photos_preparation=r.photos_preparation;
      if(state.modPhotos) delete state.modPhotos[id];
      renderPrep();
      showToast(colisChange?'✅ Modifié — réimprime les étiquettes 🏷️ si besoin':'✅ Photos ajoutées','success');
    } else showToast('❌ '+((r&&r.error)||'Erreur'),'error');
  }catch(_){ showToast('❌ Erreur réseau','error'); }
}
async function envoyerEtiquettes(id){
  try{
    const resp=await fetch(`${CFG.API_URL}/print/etiquettes`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${state.token}`},body:JSON.stringify({id})});
    const r=await resp.json().catch(()=>null);
    if(r&&r.success) showToast('🖨️ '+(r.colis||1)+' étiquette(s) envoyée(s) à l\'imprimante','success');
    else showToast('❌ Étiquettes : '+((r&&r.error)||'erreur'),'error');
  }catch(_){ showToast('❌ Étiquettes : réseau — réessaie via 🏷️','error'); }
}
function imprimerEtiquettes(id){
  const l=(state.orders||[]).find(x=>String(x.id)===String(id));
  if(!l){ showToast('Commande introuvable','error'); return; }
  const n=Math.max(1,parseInt(l.nb_colis)||1);
  const prods=etiqProduits(l);
  const cartes=[];
  for(let i=1;i<=n;i++){
    cartes.push(`<div class="etiq">
      <div class="etiq-head"><b>${ETIQ_CFG.entreprise}</b><span>BL ${esc(l.bl||'—')}</span></div>
      <div class="etiq-client">${esc(l.client_nom||l.client||'')}</div>
      <div class="etiq-adr">${esc(l.adresse||'')}${l.adresse?'<br>':''}${esc(l.ville||'')}${(l.tel1||l.tel2)?'<br>\u260e '+esc([l.tel1,l.tel2].filter(Boolean).join(' / ')):''}</div>
      <div class="etiq-colis">COLIS ${i} / ${n}</div>
      <div class="etiq-prods">${prods.map(p=>'<div>'+esc(p)+'</div>').join('')||'<div>—</div>'}</div>
      <div class="etiq-foot">Livraison ${esc(l.date_livraison||'')}</div>
    </div>`);
  }
  document.getElementById('etiqZone').innerHTML=cartes.join('');
  document.getElementById('etiqOverlay').classList.add('on');
}
function fermerEtiquettes(){ document.getElementById('etiqOverlay').classList.remove('on'); }
function lancerImpressionEtiq(){
  document.body.classList.add('printing-etiq');
  window.print();
  setTimeout(()=>document.body.classList.remove('printing-etiq'),1000);
}

document.addEventListener('visibilitychange', ()=>{ if(!document.hidden){ verifierVersion(); } });
document.getElementById('mdpInput').addEventListener('keydown', e=>{ if(e.key==='Enter') connexion(); });

if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('Hors ligne'))));`;
  try{ navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{}); }catch(_){}
}

(function(){
  function showMaint(msg){
    if(document.getElementById('maint-screen'))return;
    var d=document.createElement('div'); d.id='maint-screen';
    d.style.cssText='position:fixed;inset:0;z-index:2147483600;background:#0F1724;color:#F0F4FF;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif';
    d.innerHTML='<div style="font-size:60px;margin-bottom:14px">🔧</div><div style="font-size:22px;font-weight:800;margin-bottom:10px">Application en maintenance</div><div style="font-size:15px;max-width:430px;line-height:1.55;color:#8B9EC7">'+(msg||'Une mise à jour est en cours. Merci de réessayer un peu plus tard.')+'</div><button id="maint-admin" style="margin-top:26px;background:transparent;color:#8B9EC7;border:1px solid rgba(255,255,255,.25);padding:9px 16px;border-radius:10px;font-size:13px;cursor:pointer">Accès administrateur</button>';
    document.body.appendChild(d);
    document.getElementById('maint-admin').onclick=function(){ d.remove(); };
  }
  window.__maintShow=showMaint;
  function chk(){ try{ fetch((CFG.API_URL)+'/maintenance/'+('preparateur'),{cache:'no-store'}).then(function(r){return r.json();}).then(function(j){ if(j&&j.maintenance) showMaint(j.message); }).catch(function(){}); }catch(e){} }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',chk); else chk();
})();
</script>
