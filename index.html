<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJCV Logistique</title>
<style>
  :root{--gold:#FFB300;--bg:#0F1724;--surface:#1A2332;--border:rgba(255,255,255,.1);--text:#F0F4FF;--text2:#8B9EC7}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .logo{width:72px;height:72px;background:var(--gold);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:16px;box-shadow:0 4px 20px rgba(255,179,0,.3)}
  h1{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:4px;text-align:center}
  p{font-size:13px;color:var(--text2);margin-bottom:36px;text-align:center}
  .apps{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px}
  .app-btn{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 22px;display:flex;align-items:center;gap:16px;cursor:pointer;text-decoration:none;color:var(--text);transition:all .2s}
  .app-btn:active{opacity:.85;transform:scale(.98)}
  .app-btn.livreur{border-left:4px solid #4CAF50}
  .app-btn.carte{border-left:4px solid #64B5F6}
  .app-btn.commercial{border-left:4px solid var(--gold)}
  .app-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
  .icon-livreur{background:rgba(76,175,80,.15)}
  .icon-carte{background:rgba(100,181,246,.15)}
  .icon-commercial{background:rgba(255,179,0,.15)}
  .app-info h2{font-size:15px;font-weight:700;margin-bottom:3px}
  .app-info p{font-size:12px;color:var(--text2);margin:0}
  .version{font-size:11px;color:var(--text2);margin-top:32px;opacity:.5}
</style>
</head>
<body>
  <div class="logo">🚚</div>
  <h1>AJCV Logistique</h1>
  <p>La Réunion — 974</p>
  <div class="apps">
    <a class="app-btn livreur" href="/livreur">
      <div class="app-icon icon-livreur">📦</div>
      <div class="app-info"><h2>Appli Livreur</h2><p>Tournées · Livraisons · Signatures</p></div>
    </a>
    <a class="app-btn carte" href="/carte">
      <div class="app-icon icon-carte">🗺️</div>
      <div class="app-info"><h2>Carte Livraisons</h2><p>Suivi temps réel · Vue géographique</p></div>
    </a>
    <a class="app-btn commercial" href="/commercial">
      <div class="app-icon icon-commercial">📋</div>
      <div class="app-info"><h2>Fiches Clients</h2><p>Horaires · Contraintes · Priorités</p></div>
    </a>
  </div>
  <div class="version">AJCV Logistique La Réunion — v4.6</div>
</body>
</html>
