<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJCV Admin</title>
<style>
:root{--gold:#FFB300;--bg:#0F1724;--surface:#1A2332;--surface2:#243044;--border:rgba(255,255,255,.1);--text:#F0F4FF;--text2:#8B9EC7;--green:#22C55E;--red:#EF4444;--blue:#3B82F6;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* LOGIN */
#login{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;padding:24px}
#login.active{display:flex}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:32px;width:100%;max-width:380px}
h1{font-size:20px;font-weight:700;color:var(--gold);margin-bottom:24px;text-align:center}
label{font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px;margin-top:14px}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none}
input:focus,select:focus{border-color:var(--gold)}
.btn{padding:11px 20px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-gold{background:var(--gold);color:#0F1724;width:100%;margin-top:16px}
.btn-gold:active{opacity:.85}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:6px}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
#app.active{display:flex}
.header{background:var(--surface);border-bottom:2px solid var(--gold);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h2{font-size:16px;font-weight:700;color:var(--gold)}
.header-user{font-size:12px;color:var(--text2)}
.nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:0;overflow-x:auto}
.nav-btn{padding:12px 20px;font-size:12px;font-weight:600;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.content{padding:20px;max-width:1200px;margin:0 auto;width:100%}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.card h3{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:16px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.stat-tile{background:var(--surface2);border-radius:8px;padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:700;color:var(--gold)}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:4px}
/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface2);color:var(--text2);padding:10px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
tr:hover td{background:rgba(255,255,255,.02)}
/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:40px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:rgba(255,179,0,.05)}
.upload-zone p{color:var(--text2);margin-top:8px;font-size:13px}
.upload-icon{font-size:40px}
/* PILLS */
.pill{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pill-livré{background:rgba(34,197,94,.15);color:var(--green)}
.pill-attente{background:rgba(255,179,0,.15);color:var(--gold)}
.pill-nonlivré{background:rgba(239,68,68,.15);color:var(--red)}
.pill-reporté{background:rgba(168,85,247,.15);color:#A855F7}
/* FORM GRID */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.form-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
/* PROGRESS */
.progress-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .3s}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;max-width:320px}
.toast.show{opacity:1}
.toast.success{border-color:rgba(34,197,94,.4)}
.toast.error{border-color:rgba(239,68,68,.4)}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-bg.active{display:flex}
.modal{background:var(--surface);border-radius:var(--r);padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div style="text-align:center;font-size:40px;margin-bottom:12px">🚚</div>
    <h1>AJCV Admin</h1>
    <label>Identifiant</label>
    <input id="loginInput" type="text" placeholder="ADMIN_LAURENT" autocapitalize="none">
    <label>Mot de passe</label>
    <input id="mdpInput" type="password" placeholder="••••••••">
    <div id="loginErr" style="display:none;color:var(--red);font-size:12px;margin-top:10px;text-align:center"></div>
    <button class="btn btn-gold" onclick="connexion()">Se connecter</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <h2>🚚 AJCV Admin — La Réunion</h2>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="header-user" id="headerUser"></span>
      <button class="btn btn-sm btn-gray" onclick="logout()">Déconnexion</button>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="nav-btn" onclick="showTab('livraisons')">📦 Livraisons</button>
    <button class="nav-btn" onclick="showTab('import-liv')">📥 Import CSV Livraisons</button>
    <button class="nav-btn" onclick="showTab('import-clients')">👥 Import CSV Clients</button>
    <button class="nav-btn" onclick="showTab('users')">🔐 Utilisateurs</button>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- MODAL AJOUT LIVRAISON -->
<div class="modal-bg" id="modalLiv">
  <div class="modal">
    <h3>➕ Ajouter une livraison</h3>
    <div class="form-grid">
      <div><label>Client *</label><input id="f-client" type="text" placeholder="Nom du client"></div>
      <div><label>Ville *</label><input id="f-ville" type="text" placeholder="Saint-Pierre"></div>
      <div><label>Date *</label><input id="f-date" type="date"></div>
      <div><label>Zone *</label>
        <select id="f-zone">
          <option value="1">Zone 1 — Sud</option>
          <option value="2">Zone 2 — Est</option>
          <option value="3">Zone 3 — Ouest</option>
        </select>
      </div>
      <div><label>N° BL</label><input id="f-bl" type="text" placeholder="BL-2024-001"></div>
      <div><label>Nb colis</label><input id="f-colis" type="number" placeholder="1" min="1"></div>
      <div><label>Adresse</label><input id="f-adresse" type="text" placeholder="12 rue des Fleurs"></div>
      <div><label>Téléphone</label><input id="f-tel" type="tel" placeholder="0692 00 00 00"></div>
    </div>
    <div style="margin-top:12px"><label>Indications</label><input id="f-indic" type="text" placeholder="Informations complémentaires"></div>
    <div class="form-actions">
      <button class="btn btn-gray" onclick="document.getElementById('modalLiv').classList.remove('active')">Annuler</button>
      <button class="btn btn-green" onclick="ajouterLivraison()">✅ Ajouter</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://ajcvbackend-production.up.railway.app';
let token = '', user = {};

// ── AUTH ─────────────────────────────────────────────────────────────────
async function connexion() {
  const login = document.getElementById('loginInput').value.trim();
  const mdp   = document.getElementById('mdpInput').value.trim();
  const err   = document.getElementById('loginErr');
  err.style.display = 'none';
  if (!login || !mdp) { err.textContent = 'Remplissez tous les champs'; err.style.display='block'; return; }
  try {
    const resp = await fetch(`${API}/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({login, mdp}) });
    const data = await resp.json();
    if (data.error) { err.textContent = data.error; err.style.display='block'; return; }
    if (!['Admin','Depot'].includes(data.role)) { err.textContent = 'Accès réservé aux administrateurs'; err.style.display='block'; return; }
    token = data.token; user = data;
    localStorage.setItem('ajcv_admin_session', JSON.stringify({token, user}));
    lancerApp();
  } catch { err.textContent = 'Erreur de connexion'; err.style.display='block'; }
}

function logout() { localStorage.removeItem('ajcv_admin_session'); location.reload(); }

function lancerApp() {
  document.getElementById('login').classList.remove('active');
  document.getElementById('app').classList.add('active');
  document.getElementById('headerUser').textContent = `${user.prenom} ${user.nom||''} — ${user.role}`;
  showTab('dashboard');
}

// ── TABS ─────────────────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event && event.target && event.target.classList.add('active');
  const fns = { dashboard: renderDashboard, livraisons: renderLivraisons, 'import-liv': renderImportLiv, 'import-clients': renderImportClients, users: renderUsers };
  if (fns[tab]) fns[tab]();
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function api(method, path, body) {
  return fetch(`${API}${path}`, { method, headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: body ? JSON.stringify(body) : undefined }).then(r=>r.json());
}

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'), 4000);
}

function todayISO() { return new Date().toISOString().split('T')[0]; }
function formatFR(iso) { if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function isoToFR(iso) { if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }

function statutPill(s) {
  const map = {'✅ Livré':'livré','❌ Non livré':'nonlivré','🔄 Reporté':'reporté'};
  const cls = map[s] || 'attente';
  return `<span class="pill pill-${cls}">${s||'À livrer'}</span>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
async function renderDashboard() {
  document.getElementById('content').innerHTML = '<p style="color:var(--text2)">Chargement...</p>';
  const data = await api('GET', `/livraisons?date=${todayISO()}`).catch(()=>({livraisons:[]}));
  const livs = data.livraisons || [];
  const total  = livs.length;
  const livres = livs.filter(l=>l.statut==='✅ Livré').length;
  const nl     = livs.filter(l=>l.statut==='❌ Non livré').length;
  const att    = livs.filter(l=>!l.statut||l.statut==='À livrer').length;

  document.getElementById('content').innerHTML = `
    <div class="card">
      <h3>📊 Tableau de bord — ${formatFR(todayISO())}</h3>
      <div class="card-grid">
        <div class="stat-tile"><div class="stat-val" style="color:var(--blue)">${total}</div><div class="stat-lbl">Total livraisons</div></div>
        <div class="stat-tile"><div class="stat-val" style="color:var(--green)">${livres}</div><div class="stat-lbl">Livrées</div></div>
        <div class="stat-tile"><div class="stat-val" style="color:var(--red)">${nl}</div><div class="stat-lbl">Non livrées</div></div>
        <div class="stat-tile"><div class="stat-val" style="color:var(--gold)">${att}</div><div class="stat-lbl">En attente</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${total?Math.round(livres/total*100):0}%"></div></div>
      <p style="font-size:12px;color:var(--text2);margin-top:6px">${total?Math.round(livres/total*100):0}% de livraisons effectuées</p>
    </div>
    <div class="card">
      <h3>📦 Dernières livraisons du jour</h3>
      ${livs.length === 0 ? '<p style="color:var(--text2)">Aucune livraison pour aujourd\'hui — <a href="#" onclick="showTab(\'import-liv\')" style="color:var(--gold)">Importez un CSV</a></p>' :
      `<div class="table-wrap"><table><thead><tr><th>Client</th><th>Ville</th><th>Zone</th><th>BL</th><th>Statut</th></tr></thead><tbody>
      ${livs.slice(0,10).map(l=>`<tr><td>${l.client_nom}</td><td>${l.ville}</td><td>Z${l.zone}</td><td>${l.bl||'—'}</td><td>${statutPill(l.statut)}</td></tr>`).join('')}
      </tbody></table></div>`}
    </div>`;
}

// ── LIVRAISONS ────────────────────────────────────────────────────────────
async function renderLivraisons() {
  const dateEl = '<input type="date" id="filtre-date" value="'+todayISO()+'" onchange="renderLivraisons()" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px">';
  const zoneEl = '<select id="filtre-zone" onchange="renderLivraisons()" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px"><option value="">Toutes zones</option><option value="1">Zone 1</option><option value="2">Zone 2</option><option value="3">Zone 3</option></select>';
  document.getElementById('content').innerHTML = `
    <div class="card">
      <h3>📦 Livraisons</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
        ${dateEl} ${zoneEl}
        <button class="btn btn-sm btn-green" onclick="document.getElementById('f-date').value=document.getElementById('filtre-date').value;document.getElementById('modalLiv').classList.add('active')">➕ Ajouter</button>
      </div>
      <div id="livTable"><p style="color:var(--text2)">Chargement...</p></div>
    </div>`;

  const date  = document.getElementById('filtre-date')?.value || todayISO();
  const zone  = document.getElementById('filtre-zone')?.value || '';
  let url = `/livraisons?date=${date}`;
  if (zone) url += `&zone=${zone}`;
  const data = await api('GET', url).catch(()=>({livraisons:[]}));
  const livs = data.livraisons || [];

  document.getElementById('livTable').innerHTML = livs.length === 0 ?
    '<p style="color:var(--text2)">Aucune livraison pour cette date/zone.</p>' :
    `<div class="table-wrap"><table><thead><tr><th>#</th><th>Client</th><th>Ville</th><th>Z</th><th>BL</th><th>Colis</th><th>Statut</th><th>Actions</th></tr></thead><tbody>
    ${livs.map((l,i)=>`<tr>
      <td style="color:var(--text2)">${i+1}</td>
      <td><b>${l.client_nom}</b></td>
      <td>${l.ville}</td>
      <td>${l.zone}</td>
      <td style="font-family:monospace">${l.bl||'—'}</td>
      <td>${l.nb_colis||'—'}</td>
      <td>${statutPill(l.statut)}</td>
      <td><button class="btn btn-sm btn-red" onclick="supprimerLiv('${l.id}')">🗑️</button></td>
    </tr>`).join('')}
    </tbody></table></div>`;
}

async function ajouterLivraison() {
  const client = document.getElementById('f-client').value.trim();
  const ville  = document.getElementById('f-ville').value.trim();
  const date   = document.getElementById('f-date').value;
  const zone   = document.getElementById('f-zone').value;
  if (!client || !ville || !date) { toast('Client, ville et date sont obligatoires', 'error'); return; }

  const payload = {
    client_nom: client, ville, date_livraison: date, zone,
    bl:         document.getElementById('f-bl').value.trim(),
    nb_colis:   document.getElementById('f-colis').value.trim(),
    adresse:    document.getElementById('f-adresse').value.trim(),
    tel1:       document.getElementById('f-tel').value.trim(),
    indications:document.getElementById('f-indic').value.trim(),
    statut:     'À livrer',
  };

  const data = await api('POST', '/livraisons', payload).catch(()=>({error:'Erreur réseau'}));
  if (data.error) { toast('❌ ' + data.error, 'error'); return; }
  document.getElementById('modalLiv').classList.remove('active');
  toast('✅ Livraison ajoutée !', 'success');
  renderLivraisons();
}

async function supprimerLiv(id) {
  if (!confirm('Supprimer cette livraison ?')) return;
  await api('DELETE', `/livraisons/${id}`);
  toast('Livraison supprimée', '');
  renderLivraisons();
}

// ── TÉLÉCHARGEMENT MODÈLES CSV ───────────────────────────────────────────────
function telechargerModele(type) {
  let csv, filename;
  if (type === 'livraisons') {
    csv = `client;ville;adresse;cp;bl;nb_colis;zone;date;tel1;tel2;livreur;indications\r\nSTATION TOTAL;Saint-Pierre;12 Rue des Fleurs;97410;BL-2024-001;3;04/06/2026;1;0692000001;;Rehan;\r\nSUPERETE ALPHA;Le Tampon;45 Avenue Volcan;97430;BL-2024-002;5;04/06/2026;1;0692000002;;Romain;`;
    filename = 'modele_livraisons_ajcv.csv';
  } else {
    csv = `nom;cp;ville;adresse;tel1;tel2;email;zone;jour;horaires;contrainte;priorite\r\nSTATION TOTAL;97410;Saint-Pierre;12 Rue des Fleurs;0692000001;;contact@station.re;1;Lundi;08h00-12h00/14h00-17h30;LIBRE;NORMALE`;
    filename = 'modele_clients_ajcv.csv';
  }
  const blob = new Blob(['﻿' + csv], {type: 'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('✅ Modèle téléchargé !', 'success');
}

// ── IMPORT CSV LIVRAISONS ─────────────────────────────────────────────────
function renderImportLiv() {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <h3>📥 Import CSV — Livraisons du jour</h3>
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px">
        Exportez votre planning depuis Google Sheets (Fichier → Télécharger → CSV) et uploadez-le ici.
      </p>
      <div style="margin-bottom:16px;padding:14px;background:rgba(255,179,0,.08);border:1px solid rgba(255,179,0,.2);border-radius:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:gap">
        <div>
          <p style="font-size:13px;font-weight:700;color:var(--gold)">📄 Colonnes attendues</p>
          <p style="font-size:11px;color:var(--text2);margin-top:4px">client · ville · adresse · cp · bl · nb_colis · zone · date · tel1 · tel2 · livreur · indications</p>
        </div>
        <button class="btn btn-sm btn-gray" onclick="telechargerModele('livraisons')" style="white-space:nowrap;margin-left:12px">⬇️ Télécharger le modèle CSV</button>
      </div>
      <div class="upload-zone" id="dropZoneLiv" ondrop="dropCSV(event,'liv')" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" onclick="document.getElementById('csvLiv').click()">
        <div class="upload-icon">📄</div>
        <p>Cliquez ou glissez votre fichier CSV ici</p>
        <p style="font-size:11px;margin-top:4px">Format : CSV exporté depuis Google Sheets</p>
      </div>
      <input type="file" id="csvLiv" accept=".csv" style="display:none" onchange="lireCSVLiv(this.files[0])">
    </div>
    <div id="previewLiv"></div>`;
}

function dropCSV(e, type) {
  e.preventDefault();
  document.getElementById('dropZoneLiv').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) lireCSVLiv(file);
}

function lireCSVLiv(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => parseCSVLivraisons(e.target.result);
  reader.readAsText(file, 'UTF-8');
}

function parseCSVLivraisons(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) { toast('CSV vide ou invalide', 'error'); return; }

  const sep = lines[0].includes(';') ? ';' : ',';
  const headers = lines[0].split(sep).map(h => h.trim().replace(/"/g,'').toLowerCase());

  const rows = lines.slice(1).map(l => {
    const vals = l.split(sep).map(v => v.trim().replace(/^"|"$/g,''));
    const obj  = {};
    headers.forEach((h,i) => obj[h] = vals[i] || '');
    return obj;
  }).filter(r => Object.values(r).some(v => v));

  // Détecter automatiquement les colonnes
  const colMap = detecterColonnes(headers);

  const preview = rows.slice(0, 5);
  document.getElementById('previewLiv').innerHTML = `
    <div class="card">
      <h3>Aperçu — ${rows.length} livraisons détectées</h3>
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Vérifiez le mapping des colonnes :</p>
      <div class="form-grid" style="margin-bottom:16px">
        ${['client','ville','adresse','bl','nb_colis','zone','date','tel1'].map(f=>`
          <div><label>${f}</label>
          <select id="col-${f}" style="font-size:12px">
            <option value="">— ignorer —</option>
            ${headers.map(h=>`<option value="${h}" ${colMap[f]===h?'selected':''}>${h}</option>`).join('')}
          </select></div>`).join('')}
      </div>
      <div style="margin-bottom:12px">
        <label>Date des livraisons (si pas dans le CSV)</label>
        <input type="date" id="import-date" value="${todayISO()}" style="width:auto">
      </div>
      <div class="table-wrap" style="margin-bottom:16px">
        <table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${preview.map(r=>`<tr>${headers.map(h=>`<td>${r[h]||''}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>
      <div class="form-actions">
        <button class="btn btn-gold" onclick="importerLivraisons(${JSON.stringify(rows).replace(/'/g,"\\'")})">
          ✅ Importer ${rows.length} livraisons
        </button>
      </div>
      <div id="importProgress" style="display:none;margin-top:12px">
        <p id="importMsg" style="font-size:13px;color:var(--text2)"></p>
        <div class="progress-bar"><div class="progress-fill" id="importBar" style="width:0%"></div></div>
      </div>
    </div>`;
  window._csvRows = rows;
}

function detecterColonnes(headers) {
  const map = {};
  const patterns = {
    client:   ['client','nom','raison','société','societe'],
    ville:    ['ville','commune','localité','localite'],
    adresse:  ['adresse','addresse','rue','voie'],
    bl:       ['bl','bon','livraison','reference','réf','ref'],
    nb_colis: ['colis','nbcolis','quantite','qté','qte','nb'],
    zone:     ['zone'],
    date:     ['date','jour'],
    tel1:     ['tel','tél','téléphone','telephone','phone','mobile'],
  };
  headers.forEach(h => {
    const hn = h.toLowerCase().replace(/[^a-z]/g,'');
    for (const [field, pats] of Object.entries(patterns)) {
      if (!map[field] && pats.some(p => hn.includes(p))) map[field] = h;
    }
  });
  return map;
}

async function importerLivraisons(rows) {
  const getCol = f => document.getElementById(`col-${f}`)?.value || '';
  const date   = document.getElementById('import-date')?.value || todayISO();

  const livraisons = rows.map(r => ({
    client_nom:     r[getCol('client')]     || r[Object.keys(r)[0]] || '',
    ville:          r[getCol('ville')]      || '',
    adresse:        r[getCol('adresse')]    || '',
    bl:             r[getCol('bl')]         || '',
    nb_colis:       r[getCol('nb_colis')]   || '',
    zone:           r[getCol('zone')]       || '',
    date_livraison: r[getCol('date')]       || date,
    tel1:           r[getCol('tel1')]       || '',
    statut:         'À livrer',
  })).filter(l => l.client_nom);

  document.getElementById('importProgress').style.display = 'block';
  let ok = 0;

  for (let i = 0; i < livraisons.length; i++) {
    const l = livraisons[i];
    // Normaliser la date
    if (l.date_livraison && l.date_livraison.includes('/')) {
      const [d,m,y] = l.date_livraison.split('/');
      l.date_livraison = `${y}-${m?.padStart(2,'0')}-${d?.padStart(2,'0')}`;
    }
    if (!l.date_livraison || l.date_livraison === '--') l.date_livraison = date;

    const res = await api('POST', '/livraisons', l).catch(()=>null);
    if (res && !res.error) ok++;

    const pct = Math.round((i+1)/livraisons.length*100);
    document.getElementById('importBar').style.width = pct + '%';
    document.getElementById('importMsg').textContent = `Import en cours... ${i+1}/${livraisons.length}`;
  }

  document.getElementById('importMsg').textContent = `✅ ${ok} livraisons importées sur ${livraisons.length}`;
  toast(`✅ Import terminé — ${ok} livraisons`, 'success');
}

function dropCSVCli(e) {
  e.preventDefault();
  document.getElementById('dropZoneCli').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) lireCSVClients(file);
}

function lireCSVClients(file) {
  const reader = new FileReader();
  reader.onload = e => parseCSVClients(e.target.result);
  reader.readAsText(file, 'UTF-8');
}

function parseCSVClients(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) { toast('CSV vide', 'error'); return; }
  const sep = lines[0].includes(';') ? ';' : ',';
  const headers = lines[0].split(sep).map(h => h.trim().replace(/"/g,'').toLowerCase());
  const rows = lines.slice(1).map(l => {
    const vals = l.split(sep).map(v => v.trim().replace(/^"|"$/g,''));
    const obj  = {};
    headers.forEach((h,i) => obj[h] = vals[i] || '');
    return obj;
  }).filter(r => Object.values(r).some(v => v));

  // Normaliser les headers pour la comparaison
  const normH = h => h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
  const colMap = {
    nom:        headers.find(h => normH(h).includes('nomcommercial') || normH(h).includes('raisonsociale') || normH(h) === 'nom') || headers[0],
    cp:         headers.find(h => normH(h).includes('postal') || normH(h).includes('cp') || normH(h).includes('codepostal')) || '',
    ville:      headers.find(h => normH(h).includes('ville') || normH(h).includes('commune')) || '',
    adresse:    headers.find(h => normH(h).includes('adresse') || normH(h).includes('rue')) || '',
    tel1:       headers.find(h => (normH(h).includes('telephone') || normH(h).includes('tel')) && normH(h).includes('1')) || headers.find(h => normH(h).includes('telephone') || normH(h).includes('tel')) || '',
    tel2:       headers.find(h => (normH(h).includes('telephone') || normH(h).includes('tel')) && normH(h).includes('2')) || '',
    email:      headers.find(h => normH(h).includes('email') || normH(h).includes('mail') || normH(h).includes('courriel')) || '',
    zone:       headers.find(h => normH(h).includes('zone')) || '',
    jour:       headers.find(h => normH(h) === 'jour' || normH(h).includes('jourfixe')) || '',
    horaires:   headers.find(h => normH(h).includes('horaire')) || '',
    contrainte: headers.find(h => normH(h).includes('contrainte')) || '',
    priorite:   headers.find(h => normH(h).includes('priorit')) || '',
  };

  document.getElementById('previewCli').innerHTML = `
    <div class="card">
      <h3>Aperçu — ${rows.length} clients détectés</h3>
      <div class="form-grid" style="margin-bottom:16px">
        ${['nom','cp','ville','adresse','tel1','tel2','email','zone','jour','horaires','contrainte','priorite'].map(f=>`
          <div><label>${f}</label>
          <select id="ccol-${f}" style="font-size:12px">
            <option value="">— ignorer —</option>
            ${headers.map(h=>`<option value="${h}" ${colMap[f]===h?'selected':''}>${h}</option>`).join('')}
          </select></div>`).join('')}
      </div>
      <div style="background:rgba(255,179,0,.1);border:1px solid rgba(255,179,0,.3);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px">
        🗺️ Les coordonnées GPS seront calculées automatiquement via Google Maps pour chaque adresse à La Réunion.
      </div>
      <div class="form-actions">
        <button class="btn btn-gold" onclick="importerClients()">
          ✅ Importer ${rows.length} clients avec géocodage GPS
        </button>
      </div>
      <div id="importCliProgress" style="display:none;margin-top:12px">
        <p id="importCliMsg" style="font-size:13px;color:var(--text2)"></p>
        <div class="progress-bar"><div class="progress-fill" id="importCliBar" style="width:0%"></div></div>
      </div>
    </div>`;
  window._csvCliRows = rows;
  window._csvCliHeaders = headers;
}

async function importerClients() {
  const rows    = window._csvCliRows || [];
  const getCol  = f => document.getElementById(`ccol-${f}`)?.value || '';

      const clients = rows.map(r => ({
    nom:        r[getCol('nom')]        || '',
    cp:         r[getCol('cp')]         || '',
    ville:      r[getCol('ville')]      || '',
    adresse:    r[getCol('adresse')]    || '',
    tel1:       r[getCol('tel1')]       || '',
    tel2:       r[getCol('tel2')]       || '',
    email:      r[getCol('email')]      || '',
    zone:       r[getCol('zone')]       || '',
    jour:       r[getCol('jour')]       || '',
    horaires:   r[getCol('horaires')]   || '',
    contrainte: r[getCol('contrainte')] || 'LIBRE',
    priorite:   r[getCol('priorite')]   || 'NORMALE',
    actif:      true,
  })).filter(c => c.nom);

  document.getElementById('importCliProgress').style.display = 'block';
  let ok = 0;

  for (let i = 0; i < clients.length; i++) {
    const res = await api('POST', '/clients', clients[i]).catch(()=>null);
    if (res && !res.error) ok++;
    const pct = Math.round((i+1)/clients.length*100);
    document.getElementById('importCliBar').style.width = pct + '%';
    document.getElementById('importCliMsg').textContent = `Géocodage et import... ${i+1}/${clients.length} — ${clients[i].nom}`;
  }

  document.getElementById('importCliMsg').textContent = `✅ ${ok} clients importés sur ${clients.length}`;
  toast(`✅ ${ok} clients importés avec GPS`, 'success');
}
