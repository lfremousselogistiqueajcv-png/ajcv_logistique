<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJCV — Administration</title>
<style>
:root{--gold:#FFB300;--blue:#1565C0;--bg:#0F1724;--surface:#1A2332;--surface2:#243044;--border:rgba(255,255,255,.1);--text:#F0F4FF;--text2:#8B9EC7;--green:#22C55E;--red:#EF4444;--orange:#E67E22}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
input,select,button,textarea{font-family:inherit}
a{color:var(--gold)}
/* LOGIN */
#login{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:380px}
.login-logo{text-align:center;font-size:48px;margin-bottom:8px}
.login-card h1{font-size:20px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:4px}
.login-card .sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px}
label{font-size:12px;color:var(--text2);font-weight:600;display:block;margin-bottom:6px;margin-top:14px}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
.btn{padding:11px 18px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn-gold{background:var(--gold);color:#0F1724}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-gray{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-blue{background:var(--blue);color:#fff}
.btn-full{width:100%;margin-top:18px}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:6px}
.row-check{display:flex;align-items:center;gap:8px;margin-top:14px}
.row-check input{width:16px;height:16px;accent-color:var(--gold);cursor:pointer}
.row-check label{margin:0;cursor:pointer;font-size:13px}
.err{display:none;color:var(--red);font-size:13px;margin-top:12px;text-align:center}
.pwd-wrap{position:relative}
.pwd-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px}
/* APP */
#app{display:none}
.topbar{background:var(--surface);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100}
.topbar-inner{max-width:1300px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:4px;overflow-x:auto}
.nav-tab{padding:16px 14px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-tab:hover{color:var(--text)}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.content-wrap{max-width:1300px;margin:0 auto;padding:20px 16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.card h3{font-size:16px;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
/* TABLE */
.table-wrap{overflow-x:auto;border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface2);padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.pill{font-size:11px;padding:3px 9px;border-radius:10px;white-space:nowrap;font-weight:600}
.pill-ok{background:rgba(34,197,94,.15);color:var(--green)}
.pill-no{background:rgba(239,68,68,.15);color:var(--red)}
.pill-wait{background:rgba(230,126,34,.15);color:var(--orange)}
.inline-input{background:transparent;border:none;border-bottom:1px dashed var(--border);color:var(--text);font-size:12px;padding:3px;width:100%}
.inline-input:focus{border-bottom-color:var(--gold)}
.inline-sel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 6px;color:var(--text);font-size:11px;cursor:pointer}
/* FORM GRID */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.form-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
/* STATS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.kpi-v{font-size:28px;font-weight:700}
.kpi-l{font-size:12px;color:var(--text2);margin-top:4px}
/* AUTOCOMPLETE */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--gold);border-radius:0 0 8px 8px;max-height:240px;overflow-y:auto;z-index:999}
.ac-item{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
.ac-item:hover{background:rgba(255,179,0,.12);color:var(--gold)}
.ac-item .n{font-weight:700}
.ac-item .d{font-size:11px;color:var(--text2)}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal-bg.active{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:100%;max-width:480px;margin:auto}
.modal h3{font-size:17px;color:var(--gold);margin-bottom:16px}
/* DROPZONE */
.dropzone{border:2px dashed var(--border);border-radius:12px;padding:30px;text-align:center;cursor:pointer;transition:.2s}
.dropzone:hover{border-color:var(--gold);background:rgba(255,179,0,.04)}
.loading{text-align:center;padding:40px;color:var(--text2)}
.spin{display:inline-block;width:32px;height:32px;border:3px solid var(--surface2);border-top-color:var(--gold);border-radius:50%;animation:s 1s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--gold);border-radius:10px;padding:12px 20px;font-size:14px;z-index:9999;opacity:0;transition:.3s;max-width:90%}
.toast.show{opacity:1}
.muted{color:var(--text2);font-size:12px}
.bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-top:6px}
.bar-fill{height:100%;background:var(--gold)}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">⚙️</div>
    <h1>Administration AJCV</h1>
    <div class="sub">La Réunion — 974</div>
    <label>Identifiant</label>
    <input id="iLogin" type="text" placeholder="ADMIN_PRENOM" autocapitalize="characters">
    <label>Mot de passe</label>
    <div class="pwd-wrap">
      <input id="iMdp" type="password" placeholder="••••••••" style="padding-right:42px">
      <span class="pwd-eye" id="eye" onclick="togglePwd()">👁</span>
    </div>
    <div class="row-check"><input type="checkbox" id="remember"><label for="remember">Se souvenir de moi</label></div>
    <div class="err" id="loginErr"></div>
    <button class="btn btn-gold btn-full" onclick="connexion()">Se connecter</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="nav-tab active" data-tab="livraisons" onclick="go('livraisons')">📦 Livraisons</div>
      <div class="nav-tab" data-tab="impLiv" onclick="go('impLiv')">📥 Import Livraisons</div>
      <div class="nav-tab" data-tab="impCli" onclick="go('impCli')">📥 Import Clients</div>
      <div class="nav-tab" data-tab="clients" onclick="go('clients')">🏪 Clients</div>
      <div class="nav-tab" data-tab="users" onclick="go('users')">🔐 Utilisateurs</div>
      <div class="nav-tab" data-tab="docs" onclick="go('docs')">📄 Documents</div>
      <div class="nav-tab" data-tab="flotte" onclick="go('flotte')">🚐 Flotte</div>
      <div class="nav-tab" data-tab="kpi" onclick="go('kpi')">📊 KPI</div>
      <div class="topbar-right">
        <span id="userInfo" style="font-size:12px;color:var(--gold)"></span>
        <button class="btn btn-gray btn-sm" onclick="ouvrirMDP()">🔒</button>
        <button class="btn btn-gray btn-sm" onclick="logout()">Déco.</button>
      </div>
    </div>
  </div>
  <div class="content-wrap" id="content"></div>
</div>

<div class="toast" id="toast"></div>

<!-- MODAL CHANGER MDP -->
<div class="modal-bg" id="modalMDP">
  <div class="modal">
    <h3>🔒 Changer mon mot de passe</h3>
    <label>Ancien mot de passe</label><input id="mdp-old" type="password">
    <label>Nouveau (8 car. min, 1 maj, 1 chiffre)</label><input id="mdp-new" type="password">
    <label>Confirmer</label><input id="mdp-conf" type="password">
    <div class="err" id="mdpErr"></div>
    <div class="form-actions">
      <button class="btn btn-gray" onclick="fermerModal('modalMDP')">Annuler</button>
      <button class="btn btn-gold" onclick="changerMDP()">✅ Modifier</button>
    </div>
  </div>
</div>

<!-- MODAL AJOUT UTILISATEUR -->
<div class="modal-bg" id="modalUser">
  <div class="modal">
    <h3>➕ Nouvel utilisateur</h3>
    <div class="form-grid">
      <div><label>Identifiant *</label><input id="nu-login" placeholder="LIV_PRENOM" style="text-transform:uppercase"></div>
      <div><label>Mot de passe *</label><input id="nu-mdp" placeholder="ajcv2024" value="ajcv2024"></div>
      <div><label>Prénom *</label><input id="nu-prenom"></div>
      <div><label>Nom</label><input id="nu-nom"></div>
      <div><label>Rôle</label><select id="nu-role"><option>Livreur</option><option>Commercial</option><option>Depot</option><option>Admin</option></select></div>
      <div><label>Zone</label><select id="nu-zone"><option value="">Toutes</option><option value="🟢 Zone 1 — Livreur 1">🟢 Zone 1</option><option value="🔵 Zone 2 — Livreur 2">🔵 Zone 2</option><option value="🟠 Zone 3 — Livreur 3">🟠 Zone 3</option></select></div>
      <div><label>📧 Email</label><input id="nu-email" type="email"></div>
      <div><label>📱 Téléphone</label><input id="nu-tel" type="tel"></div>
    </div>
    <div class="err" id="userErr"></div>
    <div class="form-actions">
      <button class="btn btn-gray" onclick="fermerModal('modalUser')">Annuler</button>
      <button class="btn btn-green" onclick="creerUser()">✅ Créer</button>
    </div>
  </div>
</div>

<!-- MODAL DOCUMENT -->
<div class="modal-bg" id="modalDoc">
  <div class="modal" style="max-width:540px">
    <div id="docContent"></div>
    <div class="form-actions">
      <button class="btn btn-gray" onclick="fermerModal('modalDoc')">Fermer</button>
      <button class="btn btn-blue" onclick="telechargerPNG()">🖼️ Signature PNG</button>
      <button class="btn btn-green" onclick="telechargerDoc()">📄 Télécharger PDF</button>
    </div>
  </div>
</div>

<!-- MODAL AJOUT LIVRAISON -->
<div class="modal-bg" id="modalLiv">
  <div class="modal">
    <h3>➕ Ajouter une livraison</h3>
    <label>Client (tapez les premières lettres)</label>
    <div class="ac-wrap">
      <input id="fl-client" placeholder="Nom du client..." oninput="acClient(this.value)" autocomplete="off">
      <div id="fl-ac" class="ac-list" style="display:none"></div>
    </div>
    <div class="form-grid" style="margin-top:12px">
      <div><label>Ville</label><input id="fl-ville"></div>
      <div><label>Code postal</label><input id="fl-cp"></div>
      <div style="grid-column:1/-1"><label>Adresse</label><input id="fl-adresse"></div>
      <div><label>Zone (modifiable)</label><select id="fl-zone"><option value="🟢 Zone 1 — Livreur 1">🟢 Zone 1 — Sud</option><option value="🔵 Zone 2 — Livreur 2">🔵 Zone 2 — Est</option><option value="🟠 Zone 3 — Livreur 3">🟠 Zone 3 — Ouest</option></select></div>
      <div><label>Date de livraison</label><input id="fl-date" type="date"></div>
      <div><label>Téléphone</label><input id="fl-tel"></div>
      <div><label>Colis</label><input id="fl-colis" type="number" value="1"></div>
      <div style="grid-column:1/-1"><label>Indications</label><input id="fl-indic" placeholder="Instructions de livraison..."></div>
    </div>
    <div class="err" id="livErr"></div>
    <div class="form-actions">
      <button class="btn btn-gray" onclick="fermerModal('modalLiv')">Annuler</button>
      <button class="btn btn-green" onclick="creerLivraison()">✅ Ajouter</button>
    </div>
  </div>
</div>

<script>
const API = 'https://ajcvbackend-production.up.railway.app';
const APP_VERSION = 'v3-clean-2026';
let S = { token:'', login:'', prenom:'', role:'', tab:'livraisons' };
let _clients = null;       // cache liste clients
let _acMatches = [];       // matches autocomplete

// ── PURGE CACHE ───────────────────────────────────────────────────────────
(function(){ if(localStorage.getItem('ajcv_admin_v')!==APP_VERSION){localStorage.removeItem('ajcv_admin');localStorage.setItem('ajcv_admin_v',APP_VERSION);} })();

// ── UTILS ──────────────────────────────────────────────────────────────────
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function togglePwd(){const i=document.getElementById('iMdp'),e=document.getElementById('eye');i.type=i.type==='password'?'text':'password';e.textContent=i.type==='password'?'👁':'🙈';}
function fermerModal(id){document.getElementById(id).classList.remove('active');}
function zNum(z){const m=String(z||'').match(/[1-3]/);return m?m[0]:'';}
function zLabel(z){const n=zNum(z);return n==='1'?'🟢 Z1':n==='2'?'🔵 Z2':n==='3'?'🟠 Z3':'—';}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── API avec gestion 401 ─────────────────────────────────────────────────────
async function api(method, path, body){
  const opts = { method, headers:{'Authorization':'Bearer '+S.token} };
  if(body){ opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
  const r = await fetch(API+path, opts);
  if(r.status===401){ sessionExpiree(); throw new Error('401'); }
  return r.json();
}
function sessionExpiree(){
  localStorage.removeItem('ajcv_admin'); S.token='';
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  toast('⚠️ Session expirée, reconnectez-vous');
}

// ── CONNEXION ────────────────────────────────────────────────────────────────
async function connexion(){
  const login=document.getElementById('iLogin').value.trim();
  const mdp=document.getElementById('iMdp').value.trim();
  const err=document.getElementById('loginErr'); err.style.display='none';
  if(!login||!mdp){err.textContent='Remplissez tous les champs';err.style.display='block';return;}
  try{
    const r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,mdp})});
    const d=await r.json();
    if(d.error){err.textContent=d.error;err.style.display='block';return;}
    if(!d.token){err.textContent='Identifiants incorrects';err.style.display='block';return;}
    if(d.role!=='Admin' && d.role!=='Depot'){err.textContent='Accès réservé aux administrateurs';err.style.display='block';return;}
    S.token=d.token;S.login=login;S.prenom=d.prenom;S.role=d.role;
    if(document.getElementById('remember').checked) localStorage.setItem('ajcv_admin_creds',JSON.stringify({login,mdp}));
    else localStorage.removeItem('ajcv_admin_creds');
    localStorage.setItem('ajcv_admin',JSON.stringify({token:S.token,login:S.login,prenom:S.prenom,role:S.role}));
    demarrer();
  }catch(e){err.textContent='Erreur de connexion';err.style.display='block';}
}
function logout(){localStorage.removeItem('ajcv_admin');S.token='';document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex';}
function demarrer(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('userInfo').textContent=S.prenom+' · '+S.role;
  go('livraisons');
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function go(tab){
  S.tab=tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading"><div class="spin"></div></div>';
  if(tab==='livraisons') renderLivraisons();
  else if(tab==='impLiv') renderImportLiv();
  else if(tab==='impCli') renderImportCli();
  else if(tab==='clients') renderClients();
  else if(tab==='users') renderUsers();
  else if(tab==='docs') renderDocs();
  else if(tab==='flotte') renderFlotte();
  else if(tab==='kpi') renderKPI();
}

// ── CLIENTS (cache) ────────────────────────────────────────────────────────
async function getClients(force){
  if(_clients && !force) return _clients;
  const d=await api('GET','/clients').catch(()=>({clients:[]}));
  _clients=d.clients||[];
  return _clients;
}

// ════════════════════════════════════════════════════════════════════════════
// ONGLET LIVRAISONS
// ════════════════════════════════════════════════════════════════════════════
async function renderLivraisons(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('content').innerHTML=`
    <div class="card">
      <div class="flex-between">
        <h3>📦 Livraisons</h3>
        <button class="btn btn-green btn-sm" onclick="ouvrirAjoutLiv()">➕ Ajouter une livraison</button>
      </div>
      <div class="form-grid" style="margin-bottom:14px">
        <div><label>Date</label><input type="date" id="lv-date" value="${today}" onchange="chargerLivraisons()"></div>
        <div><label>Zone</label><select id="lv-zone" onchange="chargerLivraisons()">
          <option value="">Toutes</option><option value="1">🟢 Zone 1</option><option value="2">🔵 Zone 2</option><option value="3">🟠 Zone 3</option>
        </select></div>
      </div>
      <div id="lv-liste"></div>
    </div>`;
  chargerLivraisons();
}
async function chargerLivraisons(){
  const date=document.getElementById('lv-date').value;
  const zone=document.getElementById('lv-zone').value;
  const el=document.getElementById('lv-liste');
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  // Date JJ/MM/AAAA
  const [y,m,d]=date.split('-');
  const dFR=d+'/'+m+'/'+y;
  const q=`/livraisons?zone=${encodeURIComponent(zone)}&date=${encodeURIComponent(dFR)}`;
  try{
    const data=await api('GET',q);
    const livs=data.livraisons||[];
    if(livs.length===0){el.innerHTML='<div class="loading">Aucune livraison pour cette date/zone</div>';return;}
    el.innerHTML=`<div class="muted" style="margin-bottom:10px">${livs.length} livraison(s)</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Client</th><th>Ville</th><th>Zone</th><th>Statut</th><th>Livreur</th><th>Colis</th><th></th></tr></thead>
      <tbody>${livs.map(l=>`<tr>
        <td><b>${esc(l.client_nom)}</b></td>
        <td>${esc(l.ville)}</td>
        <td>${zLabel(l.zone)}</td>
        <td>${statutPill(l.statut)}</td>
        <td>${esc(l.livreur||'—')}</td>
        <td>${l.nb_colis||l.colis||1}</td>
        <td><button class="btn btn-red btn-sm" onclick="suppLivraison('${l.id}','${esc(l.client_nom).replace(/'/g,"\\'")}')">🗑️</button></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }catch(e){ if(e.message!=='401') el.innerHTML='<div class="loading">❌ Erreur de chargement</div>'; }
}
function statutPill(s){
  s=s||'';
  if(s.includes('Livré')) return '<span class="pill pill-ok">✅ Livré</span>';
  if(s.includes('Non')||s.includes('Échec')) return '<span class="pill pill-no">❌ Non livré</span>';
  return '<span class="pill pill-wait">📦 À livrer</span>';
}
async function suppLivraison(id,nom){
  if(!confirm('Supprimer la livraison de '+nom+' ?')) return;
  const r=await api('DELETE','/livraisons/'+id).catch(()=>null);
  if(r&&r.success){toast('🗑️ Livraison supprimée');chargerLivraisons();}
  else toast('❌ Erreur');
}

// ── AJOUT LIVRAISON + AUTOCOMPLETE ───────────────────────────────────────────
async function ouvrirAjoutLiv(){
  await getClients();
  ['fl-client','fl-ville','fl-cp','fl-adresse','fl-tel','fl-indic'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fl-colis').value=1;
  document.getElementById('fl-date').value=document.getElementById('lv-date').value;
  document.getElementById('livErr').style.display='none';
  document.getElementById('modalLiv').classList.add('active');
}
async function acClient(val){
  const list=document.getElementById('fl-ac');
  if(!val||val.length<2){list.style.display='none';return;}
  const clients=await getClients();
  const q=val.toLowerCase();
  _acMatches=clients.filter(c=>c.nom.toLowerCase().includes(q)||(c.ville||'').toLowerCase().includes(q)).slice(0,8);
  if(_acMatches.length===0){list.style.display='none';return;}

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return [];
  const sep=lines[0].includes(';')?';':',';
  const headers=lines[0].split(sep).map(h=>h.trim().toLowerCase().replace(/^["']|["']$/g,''));
  return lines.slice(1).map(line=>{
    const vals=line.split(sep).map(v=>v.trim().replace(/^["']|["']$/g,''));
    const obj={}; headers.forEach((h,i)=>obj[h]=vals[i]||''); return obj;
  });
}

  if(date){const [y,m,d]=date.split('-');q+='date='+encodeURIComponent(d+'/'+m+'/'+y)+'&';}
  if(search) q+='search='+encodeURIComponent(search);
  const r=await api('GET',q).catch(()=>({documents:[]}));
  const docs=r.documents||[];
  if(docs.length===0){el.innerHTML='<div class="loading">Aucun document signé</div>';return;}

    <tbody>${docs.map((d,i)=>`<tr>
      <td class="muted" style="white-space:nowrap">${(d.date_heure||(d.created_at||'').replace('T',' ').slice(0,16))}</td>
      <td><b>${esc(d.client)}</b></td>
      <td>${esc(d.signataire||'—')}</td>
      <td>${esc(d.livreur||'—')}</td>
      <td>${d.nb_colis||'—'}</td>
      <td>${zLabel(d.zone)}</td>
      <td><button class="btn btn-blue btn-sm" onclick="voirDoc(${i})">👁️ Voir</button></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function telechargerPNG(){
  const d=window._currentDoc; if(!d||!d.signature_base64){toast('Pas de signature');return;}
  const a=document.createElement('a'); a.href=d.signature_base64;
  a.download=numeroDoc(d)+'_signature.png'; a.click();
}

function numeroDoc(d){
  // Générer un numéro unique BDR-AAAAMMJJ-HHMMSS depuis la date du document
  let dt = d.created_at ? new Date(d.created_at) : new Date();
  if(d.date_heure){
    // date_heure format "27/05/2026 21:49"
    const m = d.date_heure.match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/);
    if(m) dt = new Date(m[3],m[2]-1,m[1],m[4],m[5]);
  }
  const p = n => ('0'+n).slice(-2);
  return 'BDR-'+dt.getFullYear()+p(dt.getMonth()+1)+p(dt.getDate())+'-'+p(dt.getHours())+p(dt.getMinutes())+p(dt.getSeconds());
}

function telechargerDoc(){
  const d=window._currentDoc; if(!d){toast('Aucun document');return;}
  genererPDF(d);
}

function genererPDF(d){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'mm',format:'a4'});
  const W = 210, M = 18;
  const num = numeroDoc(d);
  const dateHeure = d.date_heure || (d.created_at||'').replace('T',' ').slice(0,16);
  const dateJour = (dateHeure||'').slice(0,10);
  const zoneTxt = d.zone || '—';
  let y = 20;

  // ── EN-TÊTE ──
  doc.setTextColor(26,35,50); doc.setFont('helvetica','bold'); doc.setFontSize(24);
  doc.text('BON DE RÉCEPTION — AJCV', M, y);
  y += 6;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(110,110,110);
  doc.text('Service Logistique · 82C Rue Raphaël Babet · 97480 Saint-Joseph, La Réunion', M, y);
  y += 6;
  doc.setFont('courier','bold'); doc.setFontSize(11); doc.setTextColor(184,134,11);
  doc.text(num, M, y);
  y += 4;
  doc.setDrawColor(255,179,0); doc.setLineWidth(0.8); doc.line(M, y, W-M, y);
  y += 10;

  // ── IDENTIFICATION ──
  doc.setFontSize(8); doc.setTextColor(140,140,140); doc.setFont('helvetica','bold');
  doc.text('IDENTIFICATION DU DOCUMENT', M, y); y += 6;
  const col2 = 110;
  doc.setFontSize(8); doc.setTextColor(110,110,110); doc.setFont('helvetica','normal');
  doc.text('N° Document', M, y);          doc.text('Livreur', col2, y); y += 4;
  doc.setFontSize(11); doc.setTextColor(26,35,50); doc.setFont('helvetica','bold');
  doc.text(num, M, y);                    doc.text(d.livreur||'—', col2, y); y += 7;
  doc.setFontSize(8); doc.setTextColor(110,110,110); doc.setFont('helvetica','normal');
  doc.text('Date de livraison', M, y);    doc.text('Zone', col2, y); y += 4;
  doc.setFontSize(11); doc.setTextColor(26,35,50); doc.setFont('helvetica','bold');
  doc.text(dateHeure||'—', M, y);         doc.text(zoneTxt, col2, y); y += 10;

  // ── PARTIES ──
  doc.setFontSize(8); doc.setTextColor(140,140,140); doc.setFont('helvetica','bold');
  doc.text('PARTIES', M, y); y += 6;
  const yParties = y;
  // Expéditeur
  doc.setDrawColor(21,101,192); doc.setLineWidth(1.2); doc.line(M, y-2, M, y+18);
  doc.setFontSize(9); doc.setTextColor(21,101,192); doc.setFont('helvetica','bold');
  doc.text('EXPÉDITEUR', M+3, y); y += 5;
  doc.setFontSize(11); doc.setTextColor(26,35,50); doc.text('AJCV', M+3, y); y += 5;
  doc.setFontSize(9); doc.setTextColor(90,90,90); doc.setFont('helvetica','normal');
  doc.text('82C Rue Raphaël Babet', M+3, y); y += 4;
  doc.text('97480 Saint-Joseph, La Réunion', M+3, y);
  // Destinataire
  let yD = yParties;
  doc.setDrawColor(34,150,80); doc.setLineWidth(1.2); doc.line(col2, yD-2, col2, yD+18);
  doc.setFontSize(9); doc.setTextColor(34,150,80); doc.setFont('helvetica','bold');
  doc.text('DESTINATAIRE', col2+3, yD); yD += 5;
  doc.setFontSize(11); doc.setTextColor(26,35,50); doc.text((d.client||'—').toUpperCase(), col2+3, yD); yD += 5;
  doc.setFontSize(9); doc.setTextColor(90,90,90); doc.setFont('helvetica','normal');
  doc.text(d.ville||'', col2+3, yD);
  y += 12;

  // ── MARCHANDISE ──
  doc.setFontSize(8); doc.setTextColor(140,140,140); doc.setFont('helvetica','bold');
  doc.text('MARCHANDISE LIVRÉE', M, y); y += 6;
  doc.setDrawColor(220,220,220); doc.setLineWidth(0.3); doc.line(M, y, W-M, y); y += 5;
  doc.setFontSize(8); doc.setTextColor(140,140,140);
  doc.text('N° BL ASSOCIÉ', M, y); doc.text('NB DE COLIS', col2-30, y); doc.text('OBSERVATIONS / RÉSERVES', col2+10, y); y += 6;
  doc.setFontSize(11); doc.setTextColor(26,35,50); doc.setFont('helvetica','bold');
  doc.text(d.bl||'—', M, y); doc.text(String(d.nb_colis||'—'), col2-30, y);
  doc.setFont('helvetica','normal'); doc.text(d.observations||'—', col2+10, y); y += 6;
  doc.setDrawColor(220,220,220); doc.line(M, y, W-M, y); y += 10;

  // ── SIGNATURE ──
  doc.setFontSize(8); doc.setTextColor(140,140,140); doc.setFont('helvetica','bold');
  doc.text('SIGNATURE DU DESTINATAIRE', M, y); y += 7;
  const ySig = y;
  doc.setFontSize(9.5); doc.setTextColor(40,40,40); doc.setFont('helvetica','normal');
  const conf = d.conforme ? ' et la reconnaît CONFORME à la commande' : '';
  const txt = 'Je soussigné(e) '+(d.signataire||d.client||'')+', certifie avoir reçu et vérifié la marchandise décrite ci-dessus'+conf+', en date du '+dateJour+'.';
  doc.text(doc.splitTextToSize(txt, 80), M, y); y += 20;
  if(d.observations){
    doc.setTextColor(200,80,30); doc.setFont('helvetica','bold');
    doc.text(doc.splitTextToSize('Réserves : '+d.observations, 80), M, y);
    doc.setTextColor(40,40,40); doc.setFont('helvetica','normal'); y += 10;
  }
  doc.text(doc.splitTextToSize('Livraison effectuée par '+(d.livreur||'')+' — '+zoneTxt+'.', 80), M, y);
  // Cadre signature
  doc.setDrawColor(220,220,220); doc.setLineWidth(0.3); doc.roundedRect(col2, ySig-3, 72, 28, 2, 2);
  if(d.signature_base64){
    try{ doc.addImage(d.signature_base64, 'PNG', col2+6, ySig+1, 60, 16); }catch(e){}
  }
  doc.setFontSize(7); doc.setTextColor(120,120,120);
  doc.text('Signature électronique — '+dateHeure, col2+6, ySig+22);
  y = ySig + 36;

  // ── FOOTER RGPD ──
  doc.setFillColor(255,250,235); doc.roundedRect(M, y, W-2*M, 26, 2, 2, 'F');
  doc.setFontSize(7); doc.setTextColor(120,110,80);
  const rgpd = '⚖️ Valeur légale & RGPD — Ce document constitue un bon de réception opposable. La signature électronique recueillie a une valeur probatoire conformément à l\'article 1366 du Code Civil. Les données personnelles sont traitées par AJCV pour la gestion des livraisons et conservées 5 ans. Droits (accès, rectification, suppression) : sarl.ajcv@gmail.com — Réf. RGPD : Règlement (UE) 2016/679.';
  doc.text(doc.splitTextToSize(rgpd, W-2*M-6), M+3, y+5);
  y += 32;
  doc.setFontSize(7); doc.setTextColor(150,150,150);
  doc.text('AJCV Service Logistique · Document généré automatiquement '+num, M, 285);

  doc.save(num+'_Bon_Reception.pdf');
  toast('📄 PDF généré : '+num);
}
function imprimerDoc(){
  const contenu=document.getElementById('docContent').innerHTML;
  const w=window.open('','_blank');
  w.document.write('<html><head><title>Bon de réception AJCV</title></head><body>'+contenu+'</body></html>');
  w.document.close();
  setTimeout(()=>w.print(),300);
}

async function chargerFlotte(){

}

// ── CHANGER MDP ──────────────────────────────────────────────────────────────
function ouvrirMDP(){document.getElementById('modalMDP').classList.add('active');}
async function changerMDP(){
  const ancien=document.getElementById('mdp-old').value,nouveau=document.getElementById('mdp-new').value,conf=document.getElementById('mdp-conf').value;
  const err=document.getElementById('mdpErr'); err.style.display='none';
  if(!ancien||!nouveau){err.textContent='Remplissez tous les champs';err.style.display='block';return;}
  if(nouveau!==conf){err.textContent='Les mots de passe ne correspondent pas';err.style.display='block';return;}
  const r=await api('POST','/auth/change-password',{ancien,nouveau}).catch(()=>null);
  if(r&&r.success){fermerModal('modalMDP');const cr=localStorage.getItem('ajcv_admin_creds');if(cr)localStorage.setItem('ajcv_admin_creds',JSON.stringify({login:S.login,mdp:nouveau}));toast('✅ Mot de passe modifié');['mdp-old','mdp-new','mdp-conf'].forEach(id=>document.getElementById(id).value='');}
  else {err.textContent=(r&&r.error)||'Erreur';err.style.display='block';}
}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  try{const cr=JSON.parse(localStorage.getItem('ajcv_admin_creds')||'null');if(cr){document.getElementById('iLogin').value=cr.login||'';document.getElementById('iMdp').value=cr.mdp||'';document.getElementById('remember').checked=true;}}catch(_){}
  try{const sv=JSON.parse(localStorage.getItem('ajcv_admin')||'null');if(sv&&sv.token){S.token=sv.token;S.login=sv.login;S.prenom=sv.prenom;S.role=sv.role;demarrer();}}catch(_){}
  // Fermer autocomplete au clic extérieur
  document.addEventListener('click',e=>{if(!e.target.closest('#fl-client')&&!e.target.closest('#fl-ac')){const l=document.getElementById('fl-ac');if(l)l.style.display='none';}});
});
